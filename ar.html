<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>AR Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

    /* Kamera — arka plan */
    #cam {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    /* Three.js canvas — şeffaf, üstte */
    #threeCanvas {
      position: fixed; inset: 0;
      width: 100% !important;
      height: 100% !important;
      z-index: 1;
      background: transparent;
    }

    #status {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 10px; text-align: center; z-index: 30;
      font-family: monospace; font-size: 12px;
      color: #fff; background: rgba(0,0,0,0.65);
      transition: opacity 0.6s;
    }
    #hud {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 16px 16px 36px;
      background: linear-gradient(to top, rgba(0,0,0,0.45), transparent);
      text-align: center; z-index: 20; pointer-events: none;
      font-family: monospace; font-size: 11px;
      color: rgba(255,255,255,0.3); letter-spacing: 1px;
    }
  </style>
</head>
<body>

<video id="cam" autoplay playsinline muted></video>
<canvas id="threeCanvas"></canvas>
<div id="status">⏳ Yükleniyor...</div>
<div id="hud">sürükle = döndür · pinch = zoom</div>

<!-- Three.js -->
<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
const status = document.getElementById('status');

// ── Kamera ──────────────────────────────────────────────
function startCamera(simple) {
  const c = simple
    ? { video: true, audio: false }
    : { video: { facingMode: 'environment' }, audio: false };

  navigator.mediaDevices.getUserMedia(c)
    .then(stream => {
      document.getElementById('cam').srcObject = stream;
      status.textContent = '📷 Kamera açık — model yükleniyor...';
    })
    .catch(err => {
      if (!simple) startCamera(true);
      else {
        status.textContent = '❌ Kamera: ' + err.name;
        status.style.background = 'rgba(180,0,0,0.85)';
      }
    });
}
startCamera(false);

// ── Three.js Setup ───────────────────────────────────────
const canvas   = document.getElementById('threeCanvas');
const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
renderer.setClearColor(0x000000, 0);   // tamamen şeffaf
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputEncoding = THREE.sRGBEncoding;

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 100);
camera.position.set(0, 0, 3);

// Işıklar
const ambient = new THREE.AmbientLight(0xffffff, 1.2);
scene.add(ambient);
const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
dirLight.position.set(2, 4, 3);
scene.add(dirLight);
const fillLight = new THREE.DirectionalLight(0xffffff, 0.5);
fillLight.position.set(-2, -1, -2);
scene.add(fillLight);

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── GLB Yükle ────────────────────────────────────────────
let model = null;
const loader = new THREE.GLTFLoader();

loader.load(
  'Test.glb',
  gltf => {
    model = gltf.scene;

    // Modeli ortala ve normalize et
    const box    = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    const size   = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    const scale  = 1.5 / maxDim;  // ekrana sığacak şekilde otomatik scale

    model.scale.setScalar(scale);
    model.position.sub(center.multiplyScalar(scale));
    model.position.y -= 0.2;

    scene.add(model);

    // Animasyonlar varsa çalıştır
    if (gltf.animations && gltf.animations.length > 0) {
      const mixer = new THREE.AnimationMixer(model);
      gltf.animations.forEach(clip => mixer.clipAction(clip).play());
      window._mixer = mixer;
    }

    status.textContent = '✅ Hazır';
    status.style.background = 'rgba(0,130,0,0.7)';
    setTimeout(() => { status.style.opacity = '0'; }, 2500);
  },
  xhr => {
    const pct = xhr.lengthComputable ? Math.round(xhr.loaded / xhr.total * 100) : '...';
    status.textContent = `⏳ Model yükleniyor %${pct}`;
  },
  err => {
    status.textContent = '❌ Test.glb yüklenemedi: ' + err.message;
    status.style.background = 'rgba(180,0,0,0.85)';
  }
);

// ── Otomatik döndürme ────────────────────────────────────
let autoRotate = true;
let rotY = 0;

// ── Touch kontrolü ───────────────────────────────────────
let touch = { active: false, x: 0, lastRotY: 0 };
let pinch = { active: false, dist: 0, lastScale: 1.5 };
let currentScale = 1.5;

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  autoRotate = false;

  if (e.touches.length === 1) {
    touch.active = true;
    touch.x = e.touches[0].clientX;
    touch.lastRotY = rotY;
  } else if (e.touches.length === 2) {
    pinch.active = true;
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    pinch.dist = Math.sqrt(dx*dx + dy*dy);
    pinch.lastScale = currentScale;
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && touch.active && model) {
    const delta = e.touches[0].clientX - touch.x;
    rotY = touch.lastRotY + delta * 0.008;
  } else if (e.touches.length === 2 && pinch.active && model) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const newDist = Math.sqrt(dx*dx + dy*dy);
    const factor  = newDist / pinch.dist;
    currentScale  = Math.max(0.3, Math.min(5, pinch.lastScale * factor));
    model.scale.setScalar(currentScale);
  }
}, { passive: false });

canvas.addEventListener('touchend', () => {
  touch.active = false;
  pinch.active = false;
});

// ── Render Loop ──────────────────────────────────────────
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();

  if (model) {
    if (autoRotate) rotY += delta * 0.4;
    model.rotation.y = rotY;
  }

  if (window._mixer) window._mixer.update(delta);

  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
