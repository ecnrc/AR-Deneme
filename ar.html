<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>AR Viewer</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    #cam {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 0;
    }
    a-scene {
      position: fixed; inset: 0;
      z-index: 1;
    }
    #status {
      position: fixed; top: 60px; left: 0; right: 0;
      text-align: center; z-index: 20;
      font-family: monospace; font-size: 13px;
      color: #fff; background: rgba(0,0,0,0.6);
      padding: 8px;
    }
    #hud {
      position: fixed; inset: 0; z-index: 10;
      pointer-events: none;
    }
    #hud .top {
      position: absolute; top: 0; left: 0; right: 0;
      padding: 18px 20px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.55), transparent);
      display: flex; justify-content: space-between; align-items: center;
    }
    .badge { font-family: monospace; font-size: 11px; letter-spacing: 3px; color: rgba(255,255,255,0.45); text-transform: uppercase; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #4cd964; animation: blink 2s ease infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  </style>
</head>
<body>

<video id="cam" autoplay playsinline muted></video>
<div id="status">⏳ Model yükleniyor...</div>
<div id="hud">
  <div class="top">
    <span class="badge">AR · Debug</span>
    <span class="dot"></span>
  </div>
</div>

<a-scene
  renderer="alpha: true; antialias: true;"
  background="color: transparent"
  embedded
  vr-mode-ui="enabled: false"
  loading-screen="enabled: false"
>
  <a-assets>
    <a-asset-item id="model" src="Test.glb"
      onload="document.getElementById('status').textContent='✅ Model yüklendi'"
      onerror="document.getElementById('status').textContent='❌ Test.glb yüklenemedi!'; document.getElementById('status').style.background='rgba(200,0,0,0.8)'"
    ></a-asset-item>
  </a-assets>

  <!-- Test kutusu — 3D katman çalışıyor mu? -->
  <a-box
    position="0 0 -2"
    width="0.4" height="0.4" depth="0.4"
    color="#ff3b30"
    animation="property: rotation; to: 0 360 0; loop: true; dur: 3000; easing: linear"
  ></a-box>

  <!-- Asıl model -->
  <a-entity
    id="obj"
    gltf-model="#model"
    position="0 -0.5 -2"
    scale="0.4 0.4 0.4"
    animation-mixer
    animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear"
  ></a-entity>

  <a-camera look-controls="enabled: false" wasd-controls="enabled: false"></a-camera>
</a-scene>

<script>
  navigator.mediaDevices.getUserMedia({
    video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
    audio: false
  }).then(stream => {
    document.getElementById('cam').srcObject = stream;
  }).catch(err => {
    document.getElementById('status').textContent = '❌ Kamera: ' + err.message;
  });

  const obj = document.getElementById('obj');
  let startX = 0, startRot = 0;
  document.addEventListener('touchstart', e => {
    startX   = e.touches[0].clientX;
    startRot = obj.getAttribute('rotation').y;
    obj.removeAttribute('animation');
  });
  document.addEventListener('touchmove', e => {
    e.preventDefault();
    const delta = e.touches[0].clientX - startX;
    obj.setAttribute('rotation', `0 ${startRot + delta * 0.5} 0`);
  }, { passive: false });
</script>
</body>
</html>
