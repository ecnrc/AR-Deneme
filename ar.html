<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>AR Viewer</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    .a-enter-vr, .a-orientation-modal { display: none !important; }

    /* MindAR'ın oluşturduğu video ve container'ı zorla göster */
    video {
      display: block !important;
      visibility: visible !important;
      opacity: 1 !important;
      position: fixed !important;
      top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important;
      object-fit: cover !important;
      z-index: 0 !important;
    }
    /* MindAR overlay container */
    .mindar-ui-overlay {
      display: block !important;
      visibility: visible !important;
    }
    /* A-Frame canvas üstte şeffaf */
    canvas {
      position: fixed !important;
      top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important;
      z-index: 1 !important;
      background: transparent !important;
    }

    #status {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 10px; text-align: center; z-index: 9999;
      font-family: monospace; font-size: 12px;
      color: #fff; background: rgba(0,0,0,0.75);
    }
    #startBtn {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 9999;
      padding: 18px 36px;
      background: #fff; color: #000;
      font-family: monospace; font-size: 15px; font-weight: bold;
      border: none; border-radius: 12px; cursor: pointer;
    }
    #scanTxt {
      position: fixed; bottom: 40px; left: 0; right: 0;
      text-align: center; z-index: 9999;
      font-family: monospace; font-size: 13px;
      color: rgba(255,255,255,0.6);
      display: none;
    }
  </style>
</head>
<body>

<div id="status">⏳ Yükleniyor...</div>
<button id="startBtn" style="display:none" onclick="startAR()">Kamerayı Başlat</button>
<div id="scanTxt">📦 Sigara paketini kameraya göster</div>

<a-scene
  id="scene"
  mindar-image="imageTargetSrc: targets.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no;"
  color-space="sRGB"
  renderer="colorManagement: true; alpha: true;"
  background="transparent: true"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>
  <a-assets>
    <a-asset-item id="model" src="https://modelviewer.dev/shared-assets/models/Astronaut.glb"></a-asset-item>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity mindar-image-target="targetIndex: 0">
    <a-entity
      gltf-model="#model"
      position="0 0.1 0"
      scale="0.08 0.08 0.08"
      animation-mixer
    ></a-entity>
  </a-entity>
</a-scene>

<script>
  const status  = document.getElementById('status');
  const btn     = document.getElementById('startBtn');
  const scanTxt = document.getElementById('scanTxt');
  const scene   = document.getElementById('scene');

  scene.addEventListener('loaded', () => {
    status.textContent = 'Hazır';
    btn.style.display = 'block';
  });

  async function startAR() {
    btn.style.display = 'none';
    status.textContent = '📷 Başlatılıyor...';

    const mindarSystem = scene.systems['mindar-image-system'];
    try {
      await mindarSystem.start();
      status.textContent = '🎯 AR aktif — paketi göster';
      scanTxt.style.display = 'block';

      // Başladıktan sonra video elementini bul ve zorla göster
      setTimeout(() => {
        document.querySelectorAll('video').forEach(v => {
          v.style.cssText = `
            display: block !important;
            visibility: visible !important;
            opacity: 1 !important;
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
            z-index: 0 !important;
          `;
        });
        status.style.display = 'none';
      }, 500);

    } catch(e) {
      status.textContent = '❌ Hata: ' + (e.message || JSON.stringify(e));
      btn.style.display = 'block';
    }
  }

  const target = document.querySelector('[mindar-image-target]');
  target.addEventListener('targetFound', () => {
    status.style.display = 'block';
    status.textContent = '✅ Paket algılandı!';
    setTimeout(() => status.style.display = 'none', 1500);
  });
  target.addEventListener('targetLost', () => {
    scanTxt.style.display = 'block';
  });

  window.addEventListener('error', e => {
    status.textContent = '❌ ' + e.message;
    status.style.display = 'block';
  });
</script>
</body>
</html>
