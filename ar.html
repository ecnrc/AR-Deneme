<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>AR Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

    /* Kamera stretch fix — video'yu canvas üzerinden çiz */
    #bgCanvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    /* Three.js canvas — üstte, şeffaf */
    #threeCanvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 1;
    }

    #status {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 10px; text-align: center; z-index: 30;
      font-family: monospace; font-size: 12px;
      color: #fff; background: rgba(0,0,0,0.65);
      transition: opacity 0.6s;
    }
    #hud {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 16px 16px 36px;
      background: linear-gradient(to top, rgba(0,0,0,0.45), transparent);
      text-align: center; z-index: 20; pointer-events: none;
      font-family: monospace; font-size: 11px;
      color: rgba(255,255,255,0.3); letter-spacing: 1px;
    }
  </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<canvas id="threeCanvas"></canvas>
<div id="status">⏳ Yükleniyor...</div>
<div id="hud">sürükle = döndür · pinch = zoom</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
const status = document.getElementById('status');

// ── Kamera ──────────────────────────────────────────────
const vid = document.createElement('video');
vid.autoplay = true;
vid.playsInline = true;
vid.muted = true;

function startCamera(simple) {
  const c = simple
    ? { video: true, audio: false }
    : { video: { facingMode: 'environment' }, audio: false };

  navigator.mediaDevices.getUserMedia(c)
    .then(stream => {
      vid.srcObject = stream;
      vid.play();
      status.textContent = '📷 Kamera açık — model yükleniyor...';
    })
    .catch(err => {
      if (!simple) startCamera(true);
      else {
        status.textContent = '❌ Kamera: ' + err.name;
        status.style.background = 'rgba(180,0,0,0.85)';
      }
    });
}
startCamera(false);

// ── Kamera feed'i stretch olmadan çiz ───────────────────
// 2D canvas ile cover mantığını manuel uyguluyoruz
const bgCanvas = document.getElementById('bgCanvas');
const bgCtx    = bgCanvas.getContext('2d');

function drawBG() {
  requestAnimationFrame(drawBG);
  if (vid.readyState < 2) return;

  const sw = window.innerWidth;
  const sh = window.innerHeight;
  bgCanvas.width  = sw;
  bgCanvas.height = sh;

  const vw = vid.videoWidth;
  const vh = vid.videoHeight;
  if (!vw || !vh) return;

  // object-fit: cover mantığı
  const scale = Math.max(sw / vw, sh / vh);
  const drawW = vw * scale;
  const drawH = vh * scale;
  const ox    = (sw - drawW) / 2;
  const oy    = (sh - drawH) / 2;

  bgCtx.drawImage(vid, ox, oy, drawW, drawH);
}
drawBG();

// ── Three.js ─────────────────────────────────────────────
const threeCanvas = document.getElementById('threeCanvas');
const renderer = new THREE.WebGLRenderer({ canvas: threeCanvas, alpha: true, antialias: true });
renderer.setClearColor(0x000000, 0);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputEncoding = THREE.sRGBEncoding;

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 100);
camera.position.set(0, 0, 3);

// Işıklar
scene.add(new THREE.AmbientLight(0xffffff, 1.5));
const dir = new THREE.DirectionalLight(0xffffff, 1.5);
dir.position.set(2, 4, 3);
scene.add(dir);
const fill = new THREE.DirectionalLight(0xffffff, 0.6);
fill.position.set(-2, -1, -2);
scene.add(fill);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── GLB Yükle ────────────────────────────────────────────
let model = null;
let mixer = null;

const loader = new THREE.GLTFLoader();
loader.load(
  'Test.glb',
  gltf => {
    model = gltf.scene;

    // Otomatik boyutlandır
    const box    = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    const size   = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    const s      = 1.8 / maxDim;

    model.scale.setScalar(s);
    model.position.copy(center.multiplyScalar(-s));

    scene.add(model);

    if (gltf.animations.length > 0) {
      mixer = new THREE.AnimationMixer(model);
      gltf.animations.forEach(clip => mixer.clipAction(clip).play());
    }

    status.textContent = '✅ Hazır';
    status.style.background = 'rgba(0,130,0,0.7)';
    setTimeout(() => { status.style.opacity = '0'; }, 2500);
  },
  xhr => {
    if (xhr.lengthComputable) {
      status.textContent = `⏳ Model yükleniyor %${Math.round(xhr.loaded / xhr.total * 100)}`;
    }
  },
  err => {
    console.error(err);
    status.textContent = '❌ Test.glb yüklenemedi';
    status.style.background = 'rgba(180,0,0,0.85)';
  }
);

// ── Touch ────────────────────────────────────────────────
let autoRotate = true;
let rotY = 0;
let touch = { x: 0, lastRot: 0 };
let pinch = { dist: 0, lastScale: 1.8 };
let curScale = 1.8;

threeCanvas.addEventListener('touchstart', e => {
  e.preventDefault();
  autoRotate = false;
  if (e.touches.length === 1) {
    touch.x       = e.touches[0].clientX;
    touch.lastRot = rotY;
  } else if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    pinch.dist      = Math.sqrt(dx*dx + dy*dy);
    pinch.lastScale = curScale;
  }
}, { passive: false });

threeCanvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && model) {
    rotY = touch.lastRot + (e.touches[0].clientX - touch.x) * 0.008;
  } else if (e.touches.length === 2 && model) {
    const dx   = e.touches[0].clientX - e.touches[1].clientX;
    const dy   = e.touches[0].clientY - e.touches[1].clientY;
    const nd   = Math.sqrt(dx*dx + dy*dy);
    curScale   = Math.max(0.3, Math.min(5, pinch.lastScale * (nd / pinch.dist)));
    model.scale.setScalar(curScale);
  }
}, { passive: false });

// ── Render Loop ──────────────────────────────────────────
const clock = new THREE.Clock();
(function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  if (model) {
    if (autoRotate) rotY += dt * 0.5;
    model.rotation.y = rotY;
  }
  if (mixer) mixer.update(dt);
  renderer.render(scene, camera);
})();
</script>
</body>
</html>
