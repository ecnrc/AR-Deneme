<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>AR Viewer</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    .a-enter-vr, .a-orientation-modal { display: none !important; }

    #status {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 10px; text-align: center; z-index: 9999;
      font-family: monospace; font-size: 12px;
      color: #fff; background: rgba(0,0,0,0.75);
    }
    #startBtn {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 9999;
      padding: 16px 32px;
      background: #fff; color: #000;
      font-family: monospace; font-size: 16px; font-weight: bold;
      border: none; border-radius: 12px; cursor: pointer;
      display: none;
    }
    #scanTxt {
      position: fixed; bottom: 40px; left: 0; right: 0;
      text-align: center; z-index: 20;
      font-family: monospace; font-size: 13px;
      color: rgba(255,255,255,0.5);
      display: none;
    }
  </style>
</head>
<body>

<div id="status">⏳ Yükleniyor...</div>
<button id="startBtn" onclick="startAR()">Kamerayı Başlat</button>
<div id="scanTxt">Sigara paketini kameraya göster</div>

<a-scene
  id="scene"
  mindar-image="imageTargetSrc: targets.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no; filterMinCF: 0.001; filterBeta: 1000;"
  color-space="sRGB"
  renderer="colorManagement: true;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>
  <a-assets>
    <a-asset-item id="model" src="https://modelviewer.dev/shared-assets/models/Astronaut.glb"></a-asset-item>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity mindar-image-target="targetIndex: 0">
    <a-entity
      gltf-model="#model"
      position="0 0.1 0"
      scale="0.08 0.08 0.08"
      animation-mixer
    ></a-entity>
  </a-entity>
</a-scene>

<script>
  const status  = document.getElementById('status');
  const btn     = document.getElementById('startBtn');
  const scanTxt = document.getElementById('scanTxt');
  const scene   = document.getElementById('scene');

  function log(msg) {
    status.textContent = msg;
    console.log(msg);
  }

  // A-Frame yüklenince butonu göster
  scene.addEventListener('loaded', () => {
    log('✅ Hazır — başlatmak için butona bas');
    btn.style.display = 'block';
  });

  async function startAR() {
    btn.style.display = 'none';
    log('📷 Kamera izni isteniyor...');

    try {
      // Önce izni al
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment' },
        audio: false
      });
      // İzni aldık, akışı kapat — MindAR kendi açacak
      stream.getTracks().forEach(t => t.stop());
      log('✅ İzin alındı — AR başlatılıyor...');
    } catch(e) {
      try {
        // Arka kamera yoksa ön kamera dene
        const stream2 = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        stream2.getTracks().forEach(t => t.stop());
        log('✅ İzin alındı (ön kamera) — AR başlatılıyor...');
      } catch(e2) {
        log('❌ Kamera izni reddedildi: ' + e2.name);
        btn.style.display = 'block';
        return;
      }
    }

    // MindAR'ı başlat
    const mindarSystem = scene.systems['mindar-image-system'];
    if (mindarSystem) {
      try {
        await mindarSystem.start();
        log('🎯 AR aktif — paketi göster');
        scanTxt.style.display = 'block';
        setTimeout(() => { status.style.display = 'none'; }, 2000);
      } catch(e) {
        log('❌ MindAR başlatılamadı: ' + (e.message || e));
        btn.style.display = 'block';
      }
    } else {
      log('❌ MindAR system bulunamadı');
    }
  }

  // Target olayları
  const target = document.querySelector('[mindar-image-target]');
  target.addEventListener('targetFound', () => {
    log('🎯 Paket algılandı!');
    setTimeout(() => { status.style.display = 'none'; }, 1500);
  });
  target.addEventListener('targetLost', () => {
    status.style.display = 'block';
    log('👁 Paketi göster...');
  });

  window.addEventListener('error', e => log('❌ ' + e.message));
</script>
</body>
</html>
