<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>AR Viewer</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    .a-enter-vr, .a-orientation-modal { display: none !important; }
    video {
      display: block !important; visibility: visible !important; opacity: 1 !important;
      position: fixed !important; top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important;
      object-fit: cover !important; z-index: 0 !important;
    }
    canvas {
      position: fixed !important; top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important;
      z-index: 1 !important; background: transparent !important;
    }
    #status {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 10px; text-align: center; z-index: 9999;
      font-family: monospace; font-size: 12px;
      color: #fff; background: rgba(0,0,0,0.7);
      transition: opacity 0.5s;
    }
    #startBtn {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 9999; padding: 18px 36px;
      background: #fff; color: #000;
      font-family: monospace; font-size: 15px; font-weight: bold;
      border: none; border-radius: 12px; cursor: pointer; display: none;
    }
    #hint {
      position: fixed; bottom: 40px; left: 0; right: 0;
      text-align: center; z-index: 9999;
      font-family: monospace; font-size: 12px;
      color: rgba(255,255,255,0.4); display: none;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div id="status">⏳ Yükleniyor...</div>
<button id="startBtn" onclick="startAR()">Kamerayı Başlat</button>
<div id="hint">📦 paketi göster · 2 parmak = zoom</div>

<a-scene
  id="scene"
  mindar-image="
    imageTargetSrc: targets.mind;
    autoStart: false;
    uiLoading: no; uiError: no; uiScanning: no;
    filterMinCF: 0.0001;
    filterBeta: 1000;
    missTolerance: 20;
    warmupTolerance: 3;
  "
  color-space="sRGB"
  renderer="colorManagement: true; alpha: true; physicallyCorrectLights: true;"
  background="transparent: true"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>
  <a-assets>
    <a-asset-item id="model" src="https://modelviewer.dev/shared-assets/models/Astronaut.glb"></a-asset-item>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity id="targetAnchor" mindar-image-target="targetIndex: 0">
    <a-light type="ambient"     color="#ffffff" intensity="3"></a-light>
    <a-light type="directional" color="#ffffff" intensity="2" position="1 2 1"></a-light>
    <a-light type="directional" color="#8aaeff" intensity="1" position="-1 0 -1"></a-light>
    <a-entity
      id="obj"
      gltf-model="#model"
      position="0 0 0"
      scale="0.12 0.12 0.12"
      rotation="90 0 0"
      animation-mixer
    ></a-entity>
  </a-entity>
</a-scene>

<script>
  const status = document.getElementById('status');
  const btn    = document.getElementById('startBtn');
  const hint   = document.getElementById('hint');
  const scene  = document.getElementById('scene');

  // ── Dead zone + lerp smoother ────────────────────────────────
  // MindAR'ın hesapladığı raw pozisyon/rotasyonu okuyup
  // kendi smooth değerimizi modele uyguluyoruz
  AFRAME.registerComponent('stabilizer', {
    init() {
      // Anlık smooth hedef
      this.targetPos  = new THREE.Vector3();
      this.targetQuat = new THREE.Quaternion();

      // Şu an modele uygulanmış değerler
      this.currentPos  = new THREE.Vector3();
      this.currentQuat = new THREE.Quaternion();

      // Dead zone için son "kabul edilmiş" pozisyon
      this.acceptedPos  = new THREE.Vector3();
      this.acceptedQuat = new THREE.Quaternion();

      this.initialized = false;

      // Ayarlar
      this.DEAD_ZONE   = 0.015; // bu kadardan az pozisyon değişikliği → yoksay
      this.ANGLE_ZONE  = 0.008; // bu kadardan az rotasyon değişikliği → yoksay (radyan)
      this.LERP_POS    = 0.10;  // lerp hızı — düşükçe daha smooth, yavaş
      this.LERP_ROT    = 0.08;
    },

    tick() {
      const anchor = document.getElementById('targetAnchor');
      if (!anchor || !anchor.object3D.visible) return;

      const rawPos  = anchor.object3D.position;
      const rawQuat = anchor.object3D.quaternion;

      if (!this.initialized) {
        this.targetPos.copy(rawPos);
        this.targetQuat.copy(rawQuat);
        this.currentPos.copy(rawPos);
        this.currentQuat.copy(rawQuat);
        this.acceptedPos.copy(rawPos);
        this.acceptedQuat.copy(rawQuat);
        this.initialized = true;
        return;
      }

      // Pozisyon dead zone kontrolü
      const posDist = this.acceptedPos.distanceTo(rawPos);
      if (posDist > this.DEAD_ZONE) {
        this.targetPos.copy(rawPos);
        this.acceptedPos.copy(rawPos);
      }

      // Rotasyon dead zone kontrolü
      const angleDiff = this.acceptedQuat.angleTo(rawQuat);
      if (angleDiff > this.ANGLE_ZONE) {
        this.targetQuat.copy(rawQuat);
        this.acceptedQuat.copy(rawQuat);
      }

      // Smooth lerp ile mevcut değere yaklaş
      this.currentPos.lerp(this.targetPos, this.LERP_POS);
      this.currentQuat.slerp(this.targetQuat, this.LERP_ROT);

      // Modele uygula
      const obj = document.getElementById('obj');
      if (obj) {
        obj.object3D.parent.position.copy(this.currentPos).sub(rawPos);
        // Rotasyonu doğrudan model'e değil anchor'ın üstüne uyguluyoruz
        // Bunun yerine wrapper kullanmak daha temiz olur ama
        // pozisyon offseti yeterli çoğu durumda
      }
    }
  });

  scene.addEventListener('loaded', () => {
    status.textContent = 'Hazır';
    btn.style.display = 'block';

    // Stabilizer'ı scene'e bağla (global tick)
    const cam = document.querySelector('a-camera');
    cam.setAttribute('stabilizer', '');
  });

  async function startAR() {
    btn.style.display = 'none';
    status.textContent = '📷 Başlatılıyor...';
    const sys = scene.systems['mindar-image-system'];
    try {
      await sys.start();
      hint.style.display = 'block';
      setTimeout(() => {
        document.querySelectorAll('video').forEach(v => {
          v.style.cssText = `
            display:block!important; visibility:visible!important; opacity:1!important;
            position:fixed!important; top:0!important; left:0!important;
            width:100%!important; height:100%!important;
            object-fit:cover!important; z-index:0!important;
          `;
        });
        status.style.opacity = '0';
        setTimeout(() => status.style.display = 'none', 500);
      }, 600);
    } catch(e) {
      status.textContent = '❌ ' + (e.message || JSON.stringify(e));
      btn.style.display = 'block';
    }
  }

  // Pinch to scale
  let curScale = 0.12, pinchStartDist = 0, pinchStartScale = 0.12;
  function getDist(t) {
    const dx = t[0].clientX - t[1].clientX;
    const dy = t[0].clientY - t[1].clientY;
    return Math.sqrt(dx*dx + dy*dy);
  }
  document.addEventListener('touchstart', e => {
    if (e.touches.length === 2) { pinchStartDist = getDist(e.touches); pinchStartScale = curScale; }
  }, { passive: true });
  document.addEventListener('touchmove', e => {
    if (e.touches.length === 2) {
      const obj = document.getElementById('obj');
      if (!obj) return;
      curScale = Math.max(0.02, Math.min(0.5, pinchStartScale * (getDist(e.touches) / pinchStartDist)));
      obj.setAttribute('scale', `${curScale} ${curScale} ${curScale}`);
    }
  }, { passive: true });

  const target = document.querySelector('[mindar-image-target]');
  target.addEventListener('targetFound', () => { hint.textContent = '✅ 2 parmak = zoom'; });
  target.addEventListener('targetLost',  () => { hint.textContent = '📦 paketi göster · 2 parmak = zoom'; });

  window.addEventListener('error', e => {
    status.style.display = 'block'; status.style.opacity = '1';
    status.textContent = '❌ ' + e.message;
  });
</script>
</body>
</html>
