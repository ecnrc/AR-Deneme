<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>AR Viewer</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

    #cam {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    /* A-Frame'in ürettiği her şeyi şeffaf yap */
    a-scene,
    a-scene canvas,
    .a-canvas {
      position: fixed !important;
      top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important;
      z-index: 1 !important;
      background: transparent !important;
      background-color: transparent !important;
    }

    /* A-Frame'in inject ettiği default UI'ları gizle */
    .a-enter-vr, .a-orientation-modal { display: none !important; }

    #status {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 10px; text-align: center; z-index: 30;
      font-family: monospace; font-size: 12px;
      color: #fff; background: rgba(0,0,0,0.65);
      transition: opacity 0.5s;
    }
    #hud {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 16px 16px 36px;
      background: linear-gradient(to top, rgba(0,0,0,0.5), transparent);
      text-align: center; z-index: 20; pointer-events: none;
      font-family: monospace; font-size: 11px;
      color: rgba(255,255,255,0.3); letter-spacing: 1px;
    }
  </style>
</head>
<body>

<video id="cam" autoplay playsinline muted></video>
<div id="status">⏳ Başlatılıyor...</div>
<div id="hud">sürükle = döndür</div>

<a-scene
  renderer="alpha: true; antialias: true; clearColor: transparent;"
  background="color: transparent; transparent: true"
  embedded
  vr-mode-ui="enabled: false"
  loading-screen="enabled: false"
>
  <a-assets timeout="20000">
    <a-asset-item id="model" src="Test.glb"></a-asset-item>
  </a-assets>

  <a-entity
    id="obj"
    gltf-model="#model"
    position="0 -0.5 -2"
    scale="0.4 0.4 0.4"
    animation-mixer
    animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear"
  ></a-entity>

  <a-camera look-controls="enabled: false" wasd-controls="enabled: false"></a-camera>
</a-scene>

<script>
  const status = document.getElementById('status');

  // Kamera
  function startCamera(simple) {
    const constraints = simple
      ? { video: true, audio: false }
      : { video: { facingMode: 'environment' }, audio: false };

    navigator.mediaDevices.getUserMedia(constraints)
      .then(stream => {
        document.getElementById('cam').srcObject = stream;
        status.textContent = '📷 Kamera açık';
      })
      .catch(err => {
        if (!simple) {
          startCamera(true);
        } else {
          status.textContent = '❌ Kamera: ' + err.name;
          status.style.background = 'rgba(180,0,0,0.85)';
        }
      });
  }
  startCamera(false);

  // Canvas şeffaflığını JS ile de zorla
  const scene = document.querySelector('a-scene');
  scene.addEventListener('loaded', () => {
    // WebGL renderer alpha zorla
    const renderer = scene.renderer;
    if (renderer) {
      renderer.setClearColor(0x000000, 0); // alpha=0
      renderer.setPixelRatio(window.devicePixelRatio);
    }

    // Canvas element'ini de zorla
    const canvas = scene.canvas;
    if (canvas) {
      canvas.style.cssText = `
        position: fixed !important;
        top: 0 !important; left: 0 !important;
        width: 100% !important; height: 100% !important;
        background: transparent !important;
        z-index: 1 !important;
      `;
    }

    // Model eventi
    const obj = document.getElementById('obj');
    obj.addEventListener('model-loaded', () => {
      status.textContent = '✅ Hazır';
      status.style.background = 'rgba(0,120,0,0.7)';
      setTimeout(() => { status.style.opacity = '0'; }, 2000);
    });
    obj.addEventListener('model-error', () => {
      status.textContent = '❌ Test.glb yüklenemedi';
      status.style.background = 'rgba(180,0,0,0.85)';
    });
  });

  // Her frame'de renderer'ı şeffaf tut
  scene.addEventListener('loaded', () => {
    scene.renderer.setClearAlpha(0);
    // Render loop hook
    const origRender = scene.renderer.render.bind(scene.renderer);
    scene.renderer.render = function(...args) {
      scene.renderer.setClearAlpha(0);
      origRender(...args);
    };
  });

  // Döndürme
  const obj = document.getElementById('obj');
  let startX = 0, startRot = 0;
  document.addEventListener('touchstart', e => {
    startX   = e.touches[0].clientX;
    startRot = obj.getAttribute('rotation').y;
    obj.removeAttribute('animation');
  });
  document.addEventListener('touchmove', e => {
    e.preventDefault();
    const delta = e.touches[0].clientX - startX;
    obj.setAttribute('rotation', `0 ${startRot + delta * 0.5} 0`);
  }, { passive: false });
</script>
</body>
</html>
