<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>AR Viewer</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

    a-scene { position: fixed; inset: 0; }
    .a-enter-vr, .a-orientation-modal { display: none !important; }

    #status {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 10px; text-align: center; z-index: 30;
      font-family: monospace; font-size: 12px;
      color: #fff; background: rgba(0,0,0,0.65);
      transition: opacity 0.5s;
    }
    #hud {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 16px 16px 36px;
      background: linear-gradient(to top, rgba(0,0,0,0.45), transparent);
      text-align: center; z-index: 20; pointer-events: none;
      font-family: monospace; font-size: 11px;
      color: rgba(255,255,255,0.3); letter-spacing: 1px;
    }

    /* Gizli video — sadece texture kaynağı */
    #camvid {
      position: fixed; width: 1px; height: 1px;
      opacity: 0; pointer-events: none; z-index: -1;
    }
  </style>
</head>
<body>

<video id="camvid" autoplay playsinline muted></video>
<div id="status">⏳ Başlatılıyor...</div>
<div id="hud">sürükle = döndür</div>

<a-scene
  embedded
  vr-mode-ui="enabled: false"
  loading-screen="enabled: false"
  renderer="antialias: true"
>
  <a-assets timeout="20000">
    <a-asset-item id="model" src="Test.glb"></a-asset-item>
    <!-- Video texture olarak tanımlanacak, JS ile set edeceğiz -->
  </a-assets>

  <!-- Kamera feed'ini gösteren arka plan düzlemi -->
  <!-- position z=-10, büyük scale ile tüm ekranı kaplar -->
  <a-plane
    id="bg"
    position="0 0 -10"
    width="30" height="18"
    material="shader: flat; src: #camtex; side: front"
  ></a-plane>

  <!-- 3D Model -->
  <a-entity
    id="obj"
    gltf-model="#model"
    position="0 -0.5 -2"
    scale="0.4 0.4 0.4"
    animation-mixer
    animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear"
  ></a-entity>

  <a-camera
    id="cam"
    look-controls="enabled: false"
    wasd-controls="enabled: false"
    fov="60"
  ></a-camera>
</a-scene>

<script>
  const status = document.getElementById('status');
  const vid    = document.getElementById('camvid');
  const scene  = document.querySelector('a-scene');

  // Kamerayı başlat
  function startCamera(simple) {
    const c = simple ? { video: true } : { video: { facingMode: 'environment' }, audio: false };
    navigator.mediaDevices.getUserMedia(c)
      .then(stream => {
        vid.srcObject = stream;
        vid.play();
        status.textContent = '📷 Kamera açık — model yükleniyor...';
        injectVideoTexture();
      })
      .catch(err => {
        if (!simple) { startCamera(true); }
        else {
          status.textContent = '❌ Kamera: ' + err.name;
          status.style.background = 'rgba(180,0,0,0.85)';
        }
      });
  }

  // Video'yu A-Frame texture olarak enjekte et
  function injectVideoTexture() {
    function tryInject() {
      // video hazır ve boyutu var mı?
      if (vid.readyState < 2 || vid.videoWidth === 0) {
        setTimeout(tryInject, 200);
        return;
      }

      // Dinamik texture asset ekle
      const assets = scene.querySelector('a-assets');
      const videoAsset = document.createElement('video');
      videoAsset.setAttribute('id', 'camtex');
      videoAsset.setAttribute('autoplay', '');
      videoAsset.setAttribute('playsinline', '');
      videoAsset.setAttribute('muted', '');
      videoAsset.srcObject = vid.srcObject;
      videoAsset.play();
      assets.appendChild(videoAsset);

      // bg plane'e texture'ı bağla
      const bg = document.getElementById('bg');
      setTimeout(() => {
        bg.setAttribute('material', 'shader: flat; src: #camtex');
      }, 300);
    }
    tryInject();
  }

  // Scene yüklenince model takibi
  scene.addEventListener('loaded', () => {
    const obj = document.getElementById('obj');
    obj.addEventListener('model-loaded', () => {
      status.textContent = '✅ Hazır';
      status.style.background = 'rgba(0,130,0,0.7)';
      setTimeout(() => { status.style.opacity = '0'; }, 2500);
    });
    obj.addEventListener('model-error', () => {
      status.textContent = '❌ Test.glb yüklenemedi';
      status.style.background = 'rgba(180,0,0,0.85)';
    });
  });

  startCamera(false);

  // Döndürme
  const obj = document.getElementById('obj');
  let startX = 0, startRot = 0;
  document.addEventListener('touchstart', e => {
    startX   = e.touches[0].clientX;
    startRot = obj.getAttribute('rotation').y;
    obj.removeAttribute('animation');
  });
  document.addEventListener('touchmove', e => {
    e.preventDefault();
    const delta = e.touches[0].clientX - startX;
    obj.setAttribute('rotation', `0 ${startRot + delta * 0.5} 0`);
  }, { passive: false });
</script>
</body>
</html>
