<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>AR Viewer</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

    .a-enter-vr, .a-orientation-modal { display: none !important; }

    #overlay {
      position: fixed; inset: 0; z-index: 10;
      pointer-events: none;
      display: flex; flex-direction: column;
      justify-content: space-between;
    }

    #top {
      padding: 20px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
      display: flex; justify-content: space-between; align-items: center;
    }

    .badge {
      font-family: monospace; font-size: 11px;
      letter-spacing: 3px; text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #ff3b30;
      animation: blink 1.5s ease infinite;
    }
    .dot.found { background: #4cd964; animation: none; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    #bottom {
      padding: 20px 20px 40px;
      background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
      text-align: center;
      font-family: monospace; font-size: 12px;
      color: rgba(255,255,255,0.4); letter-spacing: 1px;
    }
    #scanTxt  { display: block; }
    #foundTxt { display: none; color: #4cd964; }
  </style>
</head>
<body>

<div id="overlay">
  <div id="top">
    <span class="badge">AR · Image Tracking</span>
    <span class="dot" id="dot"></span>
  </div>
  <div id="bottom">
    <span id="scanTxt">Sigara paketini kameraya göster</span>
    <span id="foundTxt">✓ Paket algılandı</span>
  </div>
</div>

<a-scene
  mindar-image="imageTargetSrc: targets.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: no;"
  color-space="sRGB"
  renderer="colorManagement: true; physicallyCorrectLights: true;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>
  <a-assets>
    <!-- Test için astronot, hazır olunca Test.glb yap -->
    <a-asset-item id="model" src="https://modelviewer.dev/shared-assets/models/Astronaut.glb"></a-asset-item>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <!-- targets.mind içindeki 0. görsele bağlan -->
  <a-entity mindar-image-target="targetIndex: 0">

    <!-- Model sigara paketinin tam üstüne oturur -->
    <!-- position y değerini modelin yüksekliğine göre ayarla -->
    <a-entity
      id="obj"
      gltf-model="#model"
      position="0 0.1 0"
      scale="0.08 0.08 0.08"
      rotation="0 0 0"
      animation-mixer
    ></a-entity>

    <!-- İsteğe bağlı: paketin üstüne ince bir spotlight -->
    <a-light type="point" intensity="2" position="0 0.5 0" color="#ffffff"></a-light>
  </a-entity>

</a-scene>

<script>
  const dot      = document.getElementById('dot');
  const scanTxt  = document.getElementById('scanTxt');
  const foundTxt = document.getElementById('foundTxt');

  // MindAR target bulundu/kayboldu
  const target = document.querySelector('[mindar-image-target]');

  target.addEventListener('targetFound', () => {
    dot.classList.add('found');
    scanTxt.style.display  = 'none';
    foundTxt.style.display = 'block';
  });

  target.addEventListener('targetLost', () => {
    dot.classList.remove('found');
    scanTxt.style.display  = 'block';
    foundTxt.style.display = 'none';
  });
</script>

</body>
</html>
