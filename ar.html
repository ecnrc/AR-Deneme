<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>AR Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #bgCanvas    { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; }
    #threeCanvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 1; }
    #startBtn {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 99; padding: 18px 36px;
      background: #fff; color: #000;
      font-family: monospace; font-size: 15px; font-weight: bold;
      border: none; border-radius: 12px; cursor: pointer;
    }
    #status {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 10px; text-align: center; z-index: 99;
      font-family: monospace; font-size: 12px;
      color: #fff; background: rgba(0,0,0,0.65);
      display: none;
    }
    #hint {
      position: fixed; bottom: 36px; left: 0; right: 0;
      text-align: center; z-index: 99; pointer-events: none;
      font-family: monospace; font-size: 11px;
      color: rgba(255,255,255,0.35); letter-spacing: 1px;
    }
    #gyroBtn {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 99; padding: 18px 36px;
      background: #000; color: #fff; border: 2px solid #fff;
      font-family: monospace; font-size: 14px; font-weight: bold;
      border-radius: 12px; cursor: pointer; display: none;
    }
  </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<canvas id="threeCanvas"></canvas>
<button id="startBtn" onclick="init()">Başlat</button>
<button id="gyroBtn" onclick="requestGyro()">Jiroskop İzni Ver (iOS)</button>
<div id="status"></div>
<div id="hint">telefonu hareket ettir · 2 parmak = zoom · 3 parmak = taşı</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
const bgCanvas    = document.getElementById('bgCanvas');
const threeCanvas = document.getElementById('threeCanvas');
const bgCtx       = bgCanvas.getContext('2d');
const statusEl    = document.getElementById('status');

function showStatus(msg, color, autohide) {
  statusEl.style.display = 'block';
  statusEl.style.background = color || 'rgba(0,0,0,0.65)';
  statusEl.textContent = msg;
  if (autohide) setTimeout(() => statusEl.style.display = 'none', autohide);
}

// ── Kamera feed ───────────────────────────────────────────
const vid = document.createElement('video');
vid.autoplay = true; vid.playsInline = true; vid.muted = true;

function startCamera() {
  return navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false })
    .then(s => { vid.srcObject = s; vid.play(); })
    .catch(() => navigator.mediaDevices.getUserMedia({ video: true, audio: false })
      .then(s => { vid.srcObject = s; vid.play(); }));
}

(function drawBG() {
  requestAnimationFrame(drawBG);
  if (vid.readyState < 2) return;
  const sw = window.innerWidth, sh = window.innerHeight;
  const vw = vid.videoWidth,    vh = vid.videoHeight;
  if (!vw) return;
  bgCanvas.width = sw; bgCanvas.height = sh;
  const sc = Math.max(sw/vw, sh/vh);
  bgCtx.drawImage(vid, (sw-vw*sc)/2, (sh-vh*sc)/2, vw*sc, vh*sc);
})();

// ── Three.js ─────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ canvas: threeCanvas, alpha: true, antialias: true });
renderer.setClearColor(0x000000, 0);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputEncoding = THREE.sRGBEncoding;

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.01, 100);

// Kamera bir wrapper içinde — jiroskop bu wrapper'ı döndürür
const cameraWrapper = new THREE.Group();
cameraWrapper.add(camera);
scene.add(cameraWrapper);

// Işıklar
scene.add(new THREE.AmbientLight(0xffffff, 1.5));
const key = new THREE.DirectionalLight(0xffffff, 2.0);
key.position.set(3, 5, 3); scene.add(key);
const fill = new THREE.DirectionalLight(0x8aaeff, 0.8);
fill.position.set(-3, 0, 2); scene.add(fill);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── Jiroskop ─────────────────────────────────────────────
let gyroEnabled = false;
const deviceQuat = new THREE.Quaternion();
const euler = new THREE.Euler();
// Telefon yönünü Three.js koordinat sistemine çeviren sabit rotasyon
const screenTransform = new THREE.Quaternion().setFromEuler(
  new THREE.Euler(-Math.PI/2, 0, 0)
);

function onDeviceOrientation(e) {
  if (e.alpha === null) return;
  // ZXY euler → quaternion
  euler.set(
    THREE.MathUtils.degToRad(e.beta),
    THREE.MathUtils.degToRad(e.alpha),
    THREE.MathUtils.degToRad(-e.gamma),
    'YXZ'
  );
  deviceQuat.setFromEuler(euler);
  // Koordinat sistemini düzelt
  cameraWrapper.quaternion.copy(deviceQuat).multiply(screenTransform);
  gyroEnabled = true;
}

function requestGyro() {
  document.getElementById('gyroBtn').style.display = 'none';
  // iOS 13+ izin gerektirir
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission()
      .then(state => {
        if (state === 'granted') {
          window.addEventListener('deviceorientation', onDeviceOrientation);
          showStatus('✅ Jiroskop aktif', 'rgba(0,120,0,0.75)', 2000);
        } else {
          showStatus('❌ Jiroskop izni reddedildi', 'rgba(160,0,0,0.85)');
        }
      });
  } else {
    window.addEventListener('deviceorientation', onDeviceOrientation);
    showStatus('✅ Jiroskop aktif', 'rgba(0,120,0,0.75)', 2000);
  }
}

// ── Model ─────────────────────────────────────────────────
let model = null, mixer = null;
// Model dünya koordinatında sabit bir noktada — kamera önünde başlasın
const modelGroup = new THREE.Group();
modelGroup.position.set(0, 0, -2); // dünya origin'den 2 birim önde
scene.add(modelGroup);

const loader = new THREE.GLTFLoader();
loader.load(
  'https://modelviewer.dev/shared-assets/models/Astronaut.glb',
  gltf => {
    model = gltf.scene;
    const box  = new THREE.Box3().setFromObject(model);
    const cent = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    const s    = 1.5 / Math.max(size.x, size.y, size.z);
    model.scale.setScalar(s);
    model.position.copy(cent.multiplyScalar(-s));
    modelGroup.add(model);
    if (gltf.animations.length > 0) {
      mixer = new THREE.AnimationMixer(model);
      gltf.animations.forEach(c => mixer.clipAction(c).play());
    }
    showStatus('✅ Hazır — telefonu hareket ettir', 'rgba(0,120,0,0.75)', 3000);
  }
);

// ── Touch: zoom (2 parmak) + taşı (3 parmak) + döndür (1 parmak) ──
let pinchStartDist = 0, pinchStartScale = 1.5;
let curScale = 1.5;
let moveStart = null;
let moveStartPos = new THREE.Vector3();
let dragStart = null;
let dragStartRot = new THREE.Euler();

function getPinchDist(ts) {
  const dx = ts[0].clientX - ts[1].clientX;
  const dy = ts[0].clientY - ts[1].clientY;
  return Math.sqrt(dx*dx + dy*dy);
}
function getTouchCenter(ts) {
  return { x: (ts[0].clientX+ts[1].clientX)/2, y: (ts[0].clientY+ts[1].clientY)/2 };
}

threeCanvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const ts = Array.from(e.touches);
  if (ts.length === 1) {
    dragStart = { x: ts[0].clientX, y: ts[0].clientY };
    dragStartRot.copy(modelGroup.rotation);
  } else if (ts.length === 2) {
    pinchStartDist  = getPinchDist(ts);
    pinchStartScale = curScale;
    dragStart = null;
  } else if (ts.length === 3) {
    const cx = (ts[0].clientX + ts[1].clientX + ts[2].clientX) / 3;
    const cy = (ts[0].clientY + ts[1].clientY + ts[2].clientY) / 3;
    moveStart = { x: cx, y: cy };
    moveStartPos.copy(modelGroup.position);
    dragStart = null;
  }
}, { passive: false });

threeCanvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!model) return;
  const ts = Array.from(e.touches);

  if (ts.length === 1 && dragStart) {
    const dx = ts[0].clientX - dragStart.x;
    const dy = ts[0].clientY - dragStart.y;
    modelGroup.rotation.y = dragStartRot.y + dx * 0.008;
    modelGroup.rotation.x = dragStartRot.x + dy * 0.008;
    modelGroup.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, modelGroup.rotation.x));

  } else if (ts.length === 2) {
    const newDist = getPinchDist(ts);
    curScale = Math.max(0.2, Math.min(10, pinchStartScale * (newDist / pinchStartDist)));
    modelGroup.scale.setScalar(curScale / 1.5);

  } else if (ts.length === 3 && moveStart) {
    const cx = (ts[0].clientX + ts[1].clientX + ts[2].clientX) / 3;
    const cy = (ts[0].clientY + ts[1].clientY + ts[2].clientY) / 3;
    const dx = (cx - moveStart.x) / window.innerWidth  * 4;
    const dy = (cy - moveStart.y) / window.innerHeight * -4;
    modelGroup.position.set(
      moveStartPos.x + dx,
      moveStartPos.y + dy,
      moveStartPos.z
    );
  }
}, { passive: false });

threeCanvas.addEventListener('touchend', e => {
  const ts = Array.from(e.touches);
  if (ts.length === 0) { dragStart = null; moveStart = null; }
}, { passive: false });

// ── Init ──────────────────────────────────────────────────
async function init() {
  document.getElementById('startBtn').style.display = 'none';
  showStatus('📷 Başlatılıyor...');

  await startCamera().catch(e => showStatus('❌ Kamera: ' + e.name, 'rgba(160,0,0,0.85)'));

  // iOS mu?
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  if (isIOS && typeof DeviceOrientationEvent.requestPermission === 'function') {
    document.getElementById('gyroBtn').style.display = 'block';
    showStatus('iOS: Jiroskop için izin gerekiyor', 'rgba(0,0,0,0.75)');
  } else {
    // Android veya desktop — direkt başlat
    window.addEventListener('deviceorientation', onDeviceOrientation);
    showStatus('✅ Kamera açık', 'rgba(0,120,0,0.75)', 2000);
  }
}

// ── Render ────────────────────────────────────────────────
const clock = new THREE.Clock();
(function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  if (mixer) mixer.update(dt);
  renderer.render(scene, camera);
})();
</script>
</body>
</html>
