<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>AR Viewer</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }

    #cam {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    /* A-Frame canvas şeffaf olsun */
    a-scene { position: fixed; inset: 0; z-index: 1; }
    a-scene canvas {
      background: transparent !important;
      position: fixed !important;
      top: 0 !important; left: 0 !important;
    }

    #status {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 10px;
      text-align: center; z-index: 30;
      font-family: monospace; font-size: 12px;
      color: #fff; background: rgba(0,0,0,0.7);
    }

    #hud {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 16px 16px 32px;
      background: linear-gradient(to top, rgba(0,0,0,0.5), transparent);
      text-align: center; z-index: 20; pointer-events: none;
      font-family: monospace; font-size: 11px;
      color: rgba(255,255,255,0.35); letter-spacing: 1px;
    }
  </style>
</head>
<body>

<video id="cam" autoplay playsinline muted></video>
<div id="status">⏳ Başlatılıyor...</div>
<div id="hud">ecnrc · AR Deneme · sürükle = döndür</div>

<a-scene
  renderer="alpha: true; antialias: true;"
  background="color: transparent"
  embedded
  vr-mode-ui="enabled: false"
  loading-screen="enabled: false"
>
  <a-assets timeout="15000">
    <a-asset-item id="model" src="Test.glb"></a-asset-item>
  </a-assets>

  <a-box
    position="0 0 -2"
    width="0.3" height="0.3" depth="0.3"
    color="#ff3b30"
    animation="property: rotation; to: 0 360 0; loop: true; dur: 2000; easing: linear"
  ></a-box>

  <a-entity
    id="obj"
    gltf-model="#model"
    position="0 -0.5 -2"
    scale="0.4 0.4 0.4"
    animation-mixer
    animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear"
  ></a-entity>

  <a-camera look-controls="enabled: false" wasd-controls="enabled: false"></a-camera>
</a-scene>

<script>
  const status = document.getElementById('status');

  // --- Kamera ---
  // Önce basit dene, başarısız olursa sadece video:true ile tekrar dene
  function startCamera(constraints) {
    navigator.mediaDevices.getUserMedia(constraints)
      .then(stream => {
        document.getElementById('cam').srcObject = stream;
        status.textContent = '📷 Kamera açık — model bekleniyor...';
      })
      .catch(err => {
        if (constraints.video !== true) {
          // Kısıtlamaları kaldır, sade dene
          startCamera({ video: true, audio: false });
        } else {
          status.textContent = '❌ Kamera hatası: ' + err.name + ' — ' + err.message;
          status.style.background = 'rgba(180,0,0,0.85)';
        }
      });
  }
  startCamera({
    video: { facingMode: 'environment' },
    audio: false
  });

  // --- Model yüklenme takibi ---
  const scene = document.querySelector('a-scene');
  scene.addEventListener('loaded', () => {
    const modelEl = document.getElementById('obj');

    modelEl.addEventListener('model-loaded', () => {
      status.textContent = '✅ Model yüklendi — kırmızı kutu + model görünmeli';
      status.style.background = 'rgba(0,120,0,0.75)';
      setTimeout(() => status.style.display = 'none', 3000);
    });

    modelEl.addEventListener('model-error', (e) => {
      status.textContent = '❌ GLB yüklenemedi — Test.glb doğru mu?';
      status.style.background = 'rgba(180,0,0,0.85)';
    });
  });

  // --- Dokunmatik döndürme ---
  const obj = document.getElementById('obj');
  let startX = 0, startRot = 0;
  document.addEventListener('touchstart', e => {
    startX   = e.touches[0].clientX;
    startRot = obj.getAttribute('rotation').y;
    obj.removeAttribute('animation');
  });
  document.addEventListener('touchmove', e => {
    e.preventDefault();
    const delta = e.touches[0].clientX - startX;
    obj.setAttribute('rotation', `0 ${startRot + delta * 0.5} 0`);
  }, { passive: false });
</script>
</body>
</html>
