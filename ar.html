<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>AR Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

    #overlay {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; padding: 32px;
      background: #0a0a0a;
    }
    #overlay h1 {
      font-family: monospace; font-size: 22px; color: #fff;
      letter-spacing: 2px; text-align: center;
    }
    #overlay p {
      font-family: monospace; font-size: 13px; color: #666;
      text-align: center; line-height: 1.7; max-width: 300px;
    }
    #startBtn {
      padding: 16px 32px; background: #fff; color: #000;
      font-family: monospace; font-size: 14px; font-weight: bold;
      border: none; border-radius: 10px; cursor: pointer;
      margin-top: 8px;
    }
    #notSupported {
      display: none;
      font-family: monospace; font-size: 13px;
      color: #f55; text-align: center; line-height: 1.7;
    }

    /* AR UI */
    #arUI {
      position: fixed; inset: 0; z-index: 10;
      pointer-events: none; display: none;
    }
    #reticle {
      position: fixed; bottom: 120px; left: 50%;
      transform: translateX(-50%);
      z-index: 11; pointer-events: none;
      font-family: monospace; font-size: 12px;
      color: rgba(255,255,255,0.5); letter-spacing: 2px;
      text-align: center;
    }
    #tapBtn {
      position: fixed; bottom: 40px; left: 50%;
      transform: translateX(-50%);
      z-index: 11; pointer-events: auto;
      padding: 14px 32px; background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff; font-family: monospace; font-size: 13px;
      border-radius: 30px; cursor: pointer; display: none;
    }
    #tapBtn.placed { background: rgba(255,255,255,0.1); font-size: 12px; }

    #exitBtn {
      position: fixed; top: 20px; right: 20px;
      z-index: 11; pointer-events: auto;
      padding: 8px 16px; background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff; font-family: monospace; font-size: 11px;
      border-radius: 8px; cursor: pointer; display: none;
    }

    /* Rotate hint */
    #rotateHint {
      position: fixed; top: 20px; left: 50%;
      transform: translateX(-50%);
      z-index: 11; pointer-events: none;
      padding: 8px 16px; background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.8); font-family: monospace; font-size: 11px;
      border-radius: 8px; display: none;
      opacity: 1; transition: opacity 1s ease;
      white-space: nowrap;
    }
  </style>
</head>
<body>

<!-- Başlangıç ekranı -->
<div id="overlay">
  <h1>AR VİEWER</h1>
  <p>Modeli gerçek dünyaya yerleştir.<br/>Etrafında serbestçe dolan.</p>
  <button id="startBtn" onclick="startAR()">AR Başlat</button>
  <div id="notSupported">
    Bu cihaz/tarayıcı WebXR AR desteklemiyor.<br/>
    Android: Chrome kullan<br/>
    iOS: Safari 15.4+ gerekli
  </div>
</div>

<!-- AR aktifken UI -->
<div id="arUI"></div>
<div id="reticle">Yüzey taranıyor...</div>
<button id="tapBtn" onclick="placeModel()">📍 Buraya Yerleştir</button>
<button id="exitBtn" onclick="exitAR()">✕ Çıkış</button>
<div id="rotateHint">↔ Sürükle → Döndür</div>

<!-- Three.js canvas WebXR tarafından yönetilir -->
<canvas id="threeCanvas" style="position:fixed;inset:0;z-index:1;"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
const canvas = document.getElementById('threeCanvas');

// ── Three.js setup ────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.xr.enabled = true; // WebXR modu

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 100);

// Işıklar
scene.add(new THREE.AmbientLight(0xffffff, 1.5));
const key = new THREE.DirectionalLight(0xffffff, 2.0);
key.position.set(3, 5, 3); scene.add(key);
const fill = new THREE.DirectionalLight(0x8aaeff, 0.8);
fill.position.set(-3, 0, 2); scene.add(fill);

// Hit test için reticle (yer işareti)
const reticleGeom = new THREE.RingGeometry(0.10, 0.14, 32).rotateX(-Math.PI/2);
const reticleMat  = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide, transparent: true, opacity: 0.9 });
const reticleMesh = new THREE.Mesh(reticleGeom, reticleMat);
reticleMesh.matrixAutoUpdate = false;
reticleMesh.visible = false;
scene.add(reticleMesh);

// Reticle ortasına nokta
const dotGeom = new THREE.CircleGeometry(0.015, 16).rotateX(-Math.PI/2);
const dotMesh = new THREE.Mesh(dotGeom, new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.9 }));
dotMesh.visible = false;
scene.add(dotMesh);

// Model group — dünya koordinatında sabit
const modelGroup = new THREE.Group();
scene.add(modelGroup);
let model = null, mixer = null, placed = false;

// Model yükle
const loader = new THREE.GLTFLoader();
loader.load(
  'duvar.glb',
  gltf => {
    model = gltf.scene;
    const box  = new THREE.Box3().setFromObject(model);
    const cent = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    const s    = 0.4 / Math.max(size.x, size.y, size.z);
    model.scale.setScalar(s);
    model.position.copy(cent.multiplyScalar(-s));
    modelGroup.visible = false;
    modelGroup.add(model);
    if (gltf.animations.length > 0) {
      mixer = new THREE.AnimationMixer(model);
      gltf.animations.forEach(c => mixer.clipAction(c).play());
    }
  }
);

// ── Dokunmatik Rotasyon ───────────────────────────────────
let touchStartX   = 0;
let touchStartY   = 0;
let isTouching    = false;
let lastPinchDist = 0;
let currentScale  = 1;
let rotateHintTimeout = null;

function getPinchDist(e) {
  const dx = e.touches[0].clientX - e.touches[1].clientX;
  const dy = e.touches[0].clientY - e.touches[1].clientY;
  return Math.sqrt(dx * dx + dy * dy);
}

document.addEventListener('touchstart', e => {
  if (!placed) return;
  if (e.target.closest('button')) return;
  if (e.touches.length === 1) {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    isTouching  = true;
  } else if (e.touches.length === 2) {
    isTouching    = false;
    lastPinchDist = getPinchDist(e);
  }
}, { passive: true });

document.addEventListener('touchmove', e => {
  if (!placed) return;
  if (e.touches.length === 1 && isTouching) {
    // Tek parmak → Y rotasyon
    const dx = e.touches[0].clientX - touchStartX;
    modelGroup.rotation.y += dx * 0.012;
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  } else if (e.touches.length === 2) {
    // İki parmak → scale
    const dist  = getPinchDist(e);
    const ratio = dist / lastPinchDist;
    currentScale = Math.max(0.05, Math.min(5, currentScale * ratio));
    modelGroup.scale.setScalar(currentScale);
    lastPinchDist = dist;
  }
}, { passive: true });

document.addEventListener('touchend', e => {
  if (e.touches.length < 2) lastPinchDist = 0;
  if (e.touches.length === 0) isTouching = false;
}, { passive: true });

function showRotateHint() {
  const hint = document.getElementById('rotateHint');
  hint.style.display = 'block';
  hint.style.opacity = '1';
  clearTimeout(rotateHintTimeout);
  rotateHintTimeout = setTimeout(() => {
    hint.style.opacity = '0';
    setTimeout(() => { hint.style.display = 'none'; }, 1000);
  }, 2500);
}

// ── WebXR ─────────────────────────────────────────────────
let xrSession = null;
let hitTestSource = null;
let hitTestSourceRequested = false;
let xrRefSpace = null;

async function startAR() {
  // WebXR desteği kontrol
  if (!navigator.xr) {
    document.getElementById('notSupported').style.display = 'block';
    document.getElementById('startBtn').style.display = 'none';
    return;
  }

  const supported = await navigator.xr.isSessionSupported('immersive-ar').catch(() => false);
  if (!supported) {
    document.getElementById('notSupported').style.display = 'block';
    document.getElementById('startBtn').style.display = 'none';
    return;
  }

  try {
    xrSession = await navigator.xr.requestSession('immersive-ar', {
      requiredFeatures: ['hit-test'],
      optionalFeatures: ['dom-overlay', 'light-estimation', 'plane-detection', 'anchors'],
      domOverlay: { root: document.body }
    });

    renderer.xr.setReferenceSpaceType('local');
    await renderer.xr.setSession(xrSession);

    xrSession.addEventListener('end', onSessionEnd);

    // UI güncelle
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('tapBtn').style.display = 'block';
    document.getElementById('exitBtn').style.display = 'block';
    document.getElementById('reticle').textContent = '📱 Telefonu yavaşça masanın üzerinde gezdir';

    // Render loop başlat
    renderer.setAnimationLoop(onXRFrame);

  } catch(e) {
    document.getElementById('notSupported').innerHTML =
      'AR başlatılamadı:<br>' + e.message + '<br><small>Android Chrome veya iOS Safari 15.4+ gerekli</small>';
    document.getElementById('notSupported').style.display = 'block';
    document.getElementById('startBtn').style.display = 'none';
  }
}

function onSessionEnd() {
  hitTestSource = null;
  hitTestSourceRequested = false;
  placed = false;
  renderer.setAnimationLoop(null);
  document.getElementById('overlay').style.display = 'flex';
  document.getElementById('tapBtn').style.display = 'none';
  document.getElementById('exitBtn').style.display = 'none';
  document.getElementById('reticle').textContent = '📱 Telefonu yavaşça masanın üzerinde gezdir';
  document.getElementById('rotateHint').style.display = 'none';
  reticleMesh.visible = false;
  dotMesh.visible = false;
  modelGroup.visible = false;
}

function exitAR() {
  if (xrSession) xrSession.end();
}

function placeModel() {
  if (!reticleMesh.visible) return;
  // Modeli reticle'ın konumuna yerleştir
  modelGroup.position.copy(reticleMesh.position);
  modelGroup.quaternion.copy(reticleMesh.quaternion);
  // Önceki rotasyonu sıfırla
  modelGroup.rotation.x = 0;
  modelGroup.rotation.z = 0;
  modelGroup.visible = true;
  placed = true;
  reticleMesh.visible = false;
  document.getElementById('reticle').textContent = '';
  const btn = document.getElementById('tapBtn');
  btn.textContent = '🔄 Yeniden Yerleştir';
  btn.classList.add('placed');
  btn.onclick = resetPlace;
  showRotateHint();
}

function resetPlace() {
  placed = false;
  modelGroup.visible = false;
  modelGroup.rotation.set(0, 0, 0);
  modelGroup.scale.setScalar(1);
  currentScale = 1;
  reticleMesh.visible = false;
  document.getElementById('reticle').textContent = 'Düz bir yüzeye bak...';
  document.getElementById('rotateHint').style.display = 'none';
  const btn = document.getElementById('tapBtn');
  btn.textContent = '📍 Buraya Yerleştir';
  btn.classList.remove('placed');
  btn.onclick = placeModel;
}

// ── XR Frame loop ─────────────────────────────────────────
function onXRFrame(timestamp, frame) {
  if (!frame) return;

  const referenceSpace = renderer.xr.getReferenceSpace();
  const session = renderer.xr.getSession();

  // Hit test source oluştur
  if (!hitTestSourceRequested) {
    session.requestReferenceSpace('viewer').then(refSpace => {
      session.requestHitTestSource({ space: refSpace }).then(source => {
        hitTestSource = source;
      });
    });
    hitTestSourceRequested = true;
  }

  // Hit test sonuçlarını al
  if (hitTestSource && !placed) {
    const results = frame.getHitTestResults(hitTestSource);
    if (results.length > 0) {
      const hit  = results[0];
      const pose = hit.getPose(referenceSpace);
      if (pose) {
        reticleMesh.visible = true;
        dotMesh.visible = true;
        reticleMesh.matrix.fromArray(pose.transform.matrix);
        reticleMesh.matrix.decompose(
          reticleMesh.position,
          reticleMesh.quaternion,
          reticleMesh.scale
        );
        // Dot'u reticle ile aynı konuma taşı
        dotMesh.position.copy(reticleMesh.position);
        dotMesh.quaternion.copy(reticleMesh.quaternion);
        dotMesh.position.y += 0.001; // z-fighting önle
        // Nabız animasyonu
        const pulse = 1 + 0.12 * Math.sin(timestamp * 0.006);
        reticleMesh.scale.setScalar(pulse);
        document.getElementById('reticle').textContent = '📍 Buraya Yerleştir\'e bas';
      }
    } else {
      reticleMesh.visible = false;
      dotMesh.visible = false;
      document.getElementById('reticle').textContent = '📱 Telefonu yavaşça masanın üzerinde gezdir';
    }
  }

  if (mixer) mixer.update(0.016);
  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
